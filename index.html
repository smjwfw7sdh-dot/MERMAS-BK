<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Mermas - Burger King</title>
    <style>
        :root {
            --bk-cream: #FDF6E2;
            --bk-brown: #502314;
            --bk-red: #DA291C;
            --bk-orange: #F47321;
            --bk-gold: #FFB81C;
            --bg-card: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', sans-serif;
        }

        body {
            background-color: var(--bk-cream);
            color: var(--bk-brown);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            border: 3px solid var(--bk-brown);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 0px var(--bk-brown);
        }

        h2 {
            text-align: center;
            color: var(--bk-red);
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px dashed var(--bk-orange);
            padding-bottom: 10px;
        }

        .alert-admin {
            background-color: #FFF0F0;
            border: 2px solid var(--bk-red);
            color: var(--bk-red);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            font-size: 13px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--bk-brown);
            font-size: 14px;
            text-transform: uppercase;
        }

        select, input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--bk-brown);
            border-radius: 8px;
            background-color: var(--bk-cream);
            color: var(--bk-brown);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--bk-orange);
        }

        .chip-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .chip {
            background-color: var(--bk-cream);
            border: 2px solid var(--bk-brown);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            text-transform: uppercase;
        }

        .chip.active {
            background-color: var(--bk-orange);
            color: white;
            border-color: var(--bk-brown);
            transform: translateY(2px);
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
        }

        .unit-label {
            font-size: 13px;
            color: var(--bk-orange);
            margin-top: -10px;
            margin-bottom: 15px;
            display: block;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--bk-brown);
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 var(--bk-brown);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--bk-brown);
        }

        .btn-submit {
            background-color: var(--bk-red);
            color: white;
            margin-bottom: 12px;
        }

        .btn-admin {
            background-color: var(--bk-gold);
            color: var(--bk-brown);
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bk-brown);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🍔 Control de Mermas BK 🍟</h2>

        <div id="alertAdmin" class="alert-admin">
            ⚠️ ACCESO LIMITADO: No posees permisos de edición de cierre de día. Dirigirse a Christopher López o Matías Pizarro.
        </div>

        <form id="mermaForm">
            <label for="responsable">Responsable</label>
            <select id="responsable" required onchange="evaluarRol()">
                <option value="" disabled selected>-- Selecciona tu Nombre --</option>
                <option value="Christopher López" data-permiso="CONCEDIDO">Christopher López (Gerente)</option>
                <option value="Yennifer Franco" data-permiso="DENEGADO">Yennifer Franco (Subgerente)</option>
                <option value="Matías Pizarro" data-permiso="CONCEDIDO">Matías Pizarro (Administrador)</option>
                <option value="Paola Martínez" data-permiso="DENEGADO">Paola Martínez (Administrador)</option>
                <option value="Ivannia Escobar" data-permiso="DENEGADO">Ivannia Escobar (Administrador)</option>
                <option value="Ignacia González" data-permiso="DENEGADO">Ignacia González (Crew Máster)</option>
            </select>

            <label for="turno">Turno</label>
            <select id="turno" required>
                <option value="AM">AM (Apertura)</option>
                <option value="PM">PM (Tarde)</option>
                <option value="Trasnoche">Trasnoche (Cierre)</option>
            </select>

            <label>Categoría</label>
            <div class="chip-container">
                <div class="chip" onclick="seleccionarCategoria('Carnes', this)">🥩 Carnes</div>
                <div class="chip" onclick="seleccionarCategoria('Snacks', this)">🍟 Snacks</div>
                <div class="chip" onclick="seleccionarCategoria('Postres', this)">🍦 Postres</div>
                <div class="chip" onclick="seleccionarCategoria('Bebidas', this)">🥤 Bebidas</div>
                <div class="chip" onclick="seleccionarCategoria('Pan', this)">🍞 Pan</div>
                <div class="chip" onclick="seleccionarCategoria('Otros', this)">📦 Otros</div>
            </div>

            <label for="producto">Producto</label>
            <select id="producto" required onchange="actualizarUnidad()">
                <option value="" disabled selected>-- Elige una categoría primero --</option>
            </select>

            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" min="0.001" step="0.001" placeholder="Ingresa cantidad numérica" required>
            <span id="unitLabel" class="unit-label"></span>

            <label for="motivo">Motivo</label>
            <select id="motivo" required>
                <option value="" disabled selected>-- Selecciona el Motivo --</option>
                <option value="Quemado/Crudo">Quemado/Crudo</option>
                <option value="Vencido">Vencido</option>
                <option value="Caída al piso">Caída al piso</option>
                <option value="Error de preparación">Error de preparación</option>
                <option value="Mal estado de origen">Mal estado de origen</option>
            </select>

            <label for="comentarios">Justificación / Detalles</label>
            <textarea id="comentarios" rows="2" placeholder="Notas adicionales opcionales..."></textarea>

            <button type="submit" class="btn-submit">💾 Guardar Merma</button>
            <button type="button" id="btnFinalizar" class="btn-admin" onclick="finalizarDia()">🏁 Finalizar Día</button>
        </form>
    </div>

    <div id="toast" class="toast">¡Guardado en Sheets!</div>

    <script>
        // Tu ID real de Google Form extraído de tu captura de pantalla
        const FORM_ID = "1H86V8-p7h_6FkZ-Wqf8Z1ZfD_fV_6Z68H1V8_X6f8Z8";
        
        // Mapeo de campos del conector
        const ENTRY_IDS = {
            responsable: "entry.1706680415",
            turno: "entry.245814524",
            categoria: "entry.1118679163_cat", // Se envía dinámico
            producto: "entry.1118679163",
            cantidad: "entry.1158140409",
            motivo: "entry.1147814402",
            comentarios: "entry.1221768822"
        };

        // MATRIZ COMPLETA DE PRODUCTOS REALES (Mapeada de tu Excel)
        const productosPorCategoria = {
            "Carnes": [
                { nombre: "Whopper Patty", unidad: "Unidades" },
                { nombre: "Mega Patty", unidad: "Unidades" },
                { nombre: "Rebel Patty", unidad: "Unidades" },
                { nombre: "Hamburguesa XT", unidad: "Unidades" },
                { nombre: "Chicken Patty", unidad: "Unidades" },
                { nombre: "Chicken Patty Vegetal", unidad: "Unidades" },
                { nombre: "Pollo Jr.", unidad: "Unidades" }
            ],
            "Snacks": [
                { nombre: "Aros de cebolla", unidad: "Unidades" },
                { nombre: "Empanadas", unidad: "Unidades" },
                { nombre: "Cheese Pillows", unidad: "Unidades" },
                { nombre: "Chicken Fries", unidad: "Unidades" },
                { nombre: "Nuggets", unidad: "Unidades" },
                { nombre: "Nuggets Vegetal", unidad: "Unidades" }
            ],
            "Postres": [
                { nombre: "Pie de Manzana", unidad: "Unidades" },
                { nombre: "Pie de chocolate", unidad: "Unidades" },
                { nombre: "Dona Tricolor", unidad: "Unidades" },
                { nombre: "Dona Fresa", unidad: "Unidades" },
                { nombre: "Muffin Chocolate", unidad: "Unidades" },
                { nombre: "Helado", unidad: "Litros" },
                { nombre: "Media Luna", unidad: "Unidades" }
            ],
            "Bebidas": [
                { nombre: "Lata Crush", unidad: "Unidades" },
                { nombre: "Lata Kem", unidad: "Unidades" },
                { nombre: "Lata Pepsi", unidad: "Unidades" },
                { nombre: "Lata Pepsi Zero", unidad: "Unidades" },
                { nombre: "Red Bull", unidad: "Unidades" },
                { nombre: "Red Bull Free", unidad: "Unidades" }
            ],
            "Pan": [
                { nombre: "Pan Whopper", unidad: "Unidades" },
                { nombre: "Pan Hamburguesa", unidad: "Unidades" },
                { nombre: "Pan Papa", unidad: "Unidades" },
                { nombre: "Pan Queso", unidad: "Unidades" },
                { nombre: "Pan Sésamo Negro", unidad: "Unidades" },
                { nombre: "Pan Masa Madre", unidad: "Unidades" },
                { nombre: "Pan Especial", unidad: "Unidades" }
            ],
            "Otros": [
                { nombre: "Vaso Cerámica", unidad: "Unidades" },
                { nombre: "Lechuga", unidad: "Kg" },
                { nombre: "Tomate", unidad: "Kg" },
                { nombre: "Cebolla", unidad: "Kg" },
                { nombre: "Lechuga Grill", unidad: "Kg" }
            ]
        };

        let categoriaGlobal = "";

        // Reloj inteligente para setear el turno del restaurante
        window.onload = function() {
            const hora = new Date().getHours();
            const comboTurno = document.getElementById("turno");
            if (hora >= 6 && hora < 14) comboTurno.value = "AM";
            else if (hora >= 14 && hora < 22) comboTurno.value = "PM";
            else comboTurno.value = "Trasnoche";
        };

        function seleccionarCategoria(cat, elemento) {
            categoriaGlobal = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            elemento.classList.add('active');

            const comboProducto = document.getElementById("producto");
            comboProducto.innerHTML = '<option value="" disabled selected>-- Elige el Producto --</option>';

            productosPorCategoria[cat].forEach(p => {
                let opt = document.createElement("option");
                opt.value = p.nombre;
                opt.textContent = p.nombre;
                opt.setAttribute('data-unit', p.unidad);
                comboProducto.appendChild(opt);
            });
            document.getElementById("unitLabel").textContent = "";
        }

        function actualizarUnidad() {
            const combo = document.getElementById("producto");
            const opcion = combo.options[combo.selectedIndex];
            const unidad = opcion.getAttribute('data-unit');
            document.getElementById("unitLabel").textContent = `Unidad de medida: ${unidad}`;
        }

        // Evalúa permisos reales basados en tu CONFIG_RESPONSABLES
        function evaluarRol() {
            const combo = document.getElementById("responsable");
            const opcionSeleccionada = combo.options[combo.selectedIndex];
            const permiso = opcionSeleccionada.getAttribute('data-permiso');
            
            const alertAdmin = document.getElementById("alertAdmin");
            const btnFinalizar = document.getElementById("btnFinalizar");

            if (permiso === "CONCEDIDO") {
                alertAdmin.style.display = "none";
                btnFinalizar.style.display = "block";
            } else {
                alertAdmin.style.display = "block";
                btnFinalizar.style.display = "none";
            }
        }

        function finalizarDia() {
            if(confirm("¿Confirmas que deseas efectuar el cierre de mermas para el estado de este día?")) {
                showToast("🏁 Estado del día cambiado a Cerrado");
            }
        }

        function showToast(msj) {
            const toast = document.getElementById("toast");
            toast.textContent = msj;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 3000);
        }

        // Envío por puente directo a tu Formulario de Google
        document.getElementById("mermaForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const resp = document.getElementById("responsable").value;
            const turno = document.getElementById("turno").value;
            const prod = document.getElementById("producto").value;
            const cant = document.getElementById("cantidad").value;
            const mot = document.getElementById("motivo").value;
            const com = document.getElementById("comentarios").value;

            const urlForm = `https://docs.google.com/forms/d/${FORM_ID}/formResponse`;
            
            const formData = new FormData();
            formData.append(ENTRY_IDS.responsable, resp);
            formData.append(ENTRY_IDS.turno, turno);
            formData.append(ENTRY_IDS.producto, prod);
            formData.append(ENTRY_IDS.cantidad, cant);
            formData.append(ENTRY_IDS.motivo, mot);
            formData.append(ENTRY_IDS.comentarios, com);

            fetch(urlForm, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                showToast("✅ Guardado en Sheets");
                document.getElementById("cantidad").value = "";
                document.getElementById("comentarios").value = "";
            }).catch(err => {
                alert("Error de red al despachar: " + err);
            });
        });
    </script>
</body>
</html>
