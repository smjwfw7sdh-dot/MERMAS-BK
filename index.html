<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Mermas Operacionales - BK</title>
    <style>
        /* Paleta Oficial Burger King (Regla 60-30-10) */
        :root {
            --bg-crema: #FDF6E2;
            --txt-marron: #502314;
            --btn-rojo: #DA291C;
            --accent-mostaza: #F2A900;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-crema);
            color: var(--txt-marron);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            border: 3px solid var(--txt-marron);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0px 8px 0px var(--txt-marron);
        }

        h2 {
            text-align: center;
            font-size: 24px;
            text-transform: uppercase;
            margin-top: 0;
            border-bottom: 3px solid var(--txt-marron);
            padding-bottom: 10px;
        }

        .alert-banner {
            background-color: var(--btn-rojo);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 13px;
        }

        /* Botones táctiles grandes (Chips) */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .chip {
            background: var(--bg-crema);
            border: 2px solid var(--txt-marron);
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: 0.2s;
        }

        .chip.active {
            background: var(--txt-marron);
            color: white;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--txt-marron);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: var(--txt-marron);
        }

        .action-btn {
            width: 100%;
            background-color: var(--btn-rojo);
            color: white;
            border: 2px solid var(--txt-marron);
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0px 4px 0px var(--txt-marron);
            text-transform: uppercase;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .gerente-btn {
            background-color: var(--accent-mostaza);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Control de Mermas BK</h2>
    
    <div id="alertBanner" class="alert-banner">
        ⚠️ Acceso no autorizado. Dirigirse a Christopher o Matías para modificar mermas.
    </div>

    <form id="mermaForm" target="hidden_iframe" onsubmit="submitted=true;" action="https://docs.google.com/forms/d/e/1FAIpQLSe0AhKy1EDUuNjcb43J8Prf4WpJp-1iE3AKwN_bsAmBEwP_og/formResponse" method="POST">
        
        <div class="form-group">
            <label>Responsable de Turno</label>
            <select id="responsable" name="entry.7" onchange="verificarPermisos()" required>
                <option value="">Seleccione responsable...</option>
                <option value="Christopher López">Christopher López (Gerente)</option>
                <option value="Matías Pizarro">Matías Pizarro (Administrador)</option>
                <option value="Yennifer Franco">Yennifer Franco (Subgerente)</option>
                <option value="Paola Martínez">Paola Martínez (Administrador)</option>
                <option value="Ivannia Escobar">Ivannia Escobar (Administrador)</option>
                <option value="Ignacia González">Ignacia González (Crew Máster)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Turno Asignado por Reloj</label>
            <input type="text" id="turno" name="entry.1" readonly>
        </div>

        <div class="form-group">
            <label>Categoría</label>
            <div class="category-grid">
                <div class="chip" onclick="seleccionarCategoria('Carnes')">Carnes</div>
                <div class="chip" onclick="seleccionarCategoria('Snacks')">Snacks</div>
                <div class="chip" onclick="seleccionarCategoria('Postres')">Postres</div>
                <div class="chip" onclick="seleccionarCategoria('Bebidas')">Bebidas</div>
                <div class="chip" onclick="seleccionarCategoria('Pan')">Pan</div>
                <div class="chip" onclick="seleccionarCategoria('Otros')">Otros</div>
            </div>
            <input type="hidden" id="categoriaInput" name="entry.2" required>
        </div>

        <div class="form-group">
            <label>Producto</label>
            <select id="producto" name="entry.3" onchange="actualizarMedida()" required>
                <option value="">Seleccione una categoría primero...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Cantidad Mermada (<span id="medidaLabel">---</span>)</label>
            <input type="number" step="0.1" name="entry.4" placeholder="0.0" required>
            <input type="hidden" id="medidaInput" name="entry.5">
        </div>

        <div class="form-group">
            <label>Motivo de Pérdida</label>
            <select name="entry.6" required>
                <option value="Quemado/Crudo">Quemado/Crudo</option>
                <option value="Contaminado">Contaminado</option>
                <option value="Vencido">Vencido</option>
                <option value="Operación">Operación</option>
                <option value="Daño de fábrica">Daño de fábrica</option>
            </select>
        </div>

        <button type="submit" id="btnGuardar" class="action-btn">💾 Guardar Merma</button>
    </form>
    
    <button id="btnFinalizar" class="action-btn gerente-btn" style="display:none;" onclick="alert('Día finalizado. Jornada guardada en tu Sheets.')">🏁 Finalizar Día</button>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {alert('Merma registrada con éxito en tu Excel.'); window.location.reload();}"></iframe>

<script>
    let submitted = false;

    // Catálogo Maestro de Burger King Chile
    const productosBK = {
        'Carnes': ['Whopper Patty', 'Mega Patty', 'Rebel Patty', 'Hamburguesa XT', 'Chicken Patty', 'Chicken Patty Vegetal', 'Pollo Jr.'],
        'Snacks': ['Aros de cebolla', 'Empanadas', 'Cheese Pillows', 'Chicken Fries', 'Nuggets', 'Nuggets Vegetal'],
        'Postres': ['Pie de Manzana', 'Pie de chocolate', 'Dona Tricolor', 'Dona Fresa', 'Muffin Chocolate', 'Media Luna', 'Helado'],
        'Bebidas': ['Lata Crush', 'Lata Kem', 'Lata Pepsi', 'Lata Pepsi Zero', 'Red Bull', 'Red Bull Free'],
        'Pan': ['Pan Whopper', 'Pan Hamburguesa', 'Pan Papa', 'Pan Queso', 'Pan Sésamo Negro', 'Pan Masa Madre', 'Pan Especial'],
        'Otros': ['Vaso Cerámica', 'Lechuga', 'Tomate', 'Cebolla', 'Lechuga Grill']
    };

    // Script automático de Horario comercial de Chile
    function calcularTurno() {
        const ahora = new Date();
        const horas = ahora.getHours();
        const minutos = ahora.getMinutes();
        const tiempo = (horas * 60) + minutos;

        if (tiempo >= (8*60) && tiempo <= (16*60+30)) return "AM";
        if (tiempo > (16*60+30) && tiempo <= (22*60)) return "PM";
        return "Trasnoche";
    }
    document.getElementById('turno').value = calcularTurno();

    // Menú en Cascada Dinámico
    function seleccionarCategoria(cat) {
        document.getElementById('categoriaInput').value = cat;
        const chips = document.querySelectorAll('.chip');
        chips.forEach(c => c.classList.remove('active'));
        
        // Marcar el botón activo visualmente
        event.target.classList.add('active');

        const prodSelect = document.getElementById('producto');
        prodSelect.innerHTML = '<option value="">Seleccione producto...</option>';
        
        productosBK[cat].forEach(p => {
            let opt = document.createElement('option');
            opt.value = p;
            opt.innerHTML = p;
            prodSelect.appendChild(opt);
        });
    }

    // Identificador Inteligente de Unidades/Métricas
    function actualizarMedida() {
        const prod = document.getElementById('producto').value;
        let medida = "Unidades";
        if (prod === 'Helado') medida = "Litros";
        if (['Lechuga', 'Tomate', 'Cebolla', 'Lechuga Grill'].includes(prod)) medida = "Kg";
        
        document.getElementById('medidaLabel').innerHTML = medida;
        document.getElementById('medidaInput').value = medida;
    }

    // Regla de Permisos y Roles de Seguridad (Christopher y Matías)
    function verificarPermisos() {
        const resp = document.getElementById('responsable').value;
        const esGerente = ["Christopher López", "Matías Pizarro"].includes(resp);
        
        if (resp !== "" && !esGerente) {
            document.getElementById('alertBanner').style.display = "block";
            document.getElementById('btnFinalizar').style.display = "none";
        } else if (esGerente) {
            document.getElementById('alertBanner').style.display = "none";
            document.getElementById('btnFinalizar').style.display = "block";
        } else {
            document.getElementById('alertBanner').style.display = "none";
            document.getElementById('btnFinalizar').style.display = "none";
        }
    }
</script>
</body>
</html>
