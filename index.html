<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Mermas - Burger King</title>
    <style>
        :root { --bk-cream: #FDF6E2; --bk-brown: #502314; --bk-red: #DA291C; --bk-orange: #F47321; --bk-gold: #FFB81C; --bg-card: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; }
        body { background-color: var(--bk-cream); color: var(--bk-brown); padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .container { width: 100%; max-width: 600px; background: var(--bg-card); border: 3px solid var(--bk-brown); border-radius: 16px; padding: 20px; box-shadow: 0 8px 0px var(--bk-brown); }
        h2 { text-align: center; color: var(--bk-red); font-size: 24px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 3px dashed var(--bk-orange); padding-bottom: 10px; }
        .alert-admin { background-color: #FFF0F0; border: 2px solid var(--bk-red); color: var(--bk-red); padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; display: none; font-size: 13px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--bk-brown); font-size: 14px; text-transform: uppercase; }
        select, input[type="number"], input[type="date"], input[type="time"], textarea { width: 100%; padding: 12px; border: 2px solid var(--bk-brown); border-radius: 8px; background-color: var(--bk-cream); color: var(--bk-brown); font-size: 16px; font-weight: bold; margin-bottom: 15px; outline: none; }
        .chip-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .chip { background-color: var(--bk-cream); border: 2px solid var(--bk-brown); padding: 10px 5px; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; transition: all 0.2s; font-size: 11px; text-transform: uppercase; }
        .chip.active { background-color: var(--bk-orange); color: white; transform: translateY(2px); box-shadow: inset 0 3px 5px rgba(0,0,0,0.2); }
        .unit-label { font-size: 13px; color: var(--bk-orange); margin-top: -10px; margin-bottom: 15px; display: block; font-weight: bold; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 15px; border: 2px solid var(--bk-brown); border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 var(--bk-brown); transition: transform 0.1s, box-shadow 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 0px 0 var(--bk-brown); }
        .btn-submit { background-color: var(--bk-red); color: white; }
        .btn-export { background-color: var(--bk-gold); color: var(--bk-brown); }
        .btn-clear-all { background-color: #7A7A7A; color: white; }
        .table-container { width: 100%; max-width: 600px; background: white; border: 3px solid var(--bk-brown); border-radius: 16px; padding: 15px; box-shadow: 0 8px 0px var(--bk-brown); overflow-x: auto; }
        .table-title { font-size: 18px; color: var(--bk-brown); margin-bottom: 12px; text-transform: uppercase; border-bottom: 2px solid var(--bk-orange); padding-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid #DDD; white-space: nowrap; }
        th { background-color: var(--bk-cream); color: var(--bk-brown); text-transform: uppercase; }
        .btn-delete { background-color: var(--bk-red); color: white; border: 1px solid var(--bk-brown); padding: 4px 8px; font-size: 11px; border-radius: 4px; box-shadow: none; width: auto; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: var(--bk-brown); color: white; padding: 12px 25px; border-radius: 25px; font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🍔 Registro Local de Mermas 🍟</h2>
        <div id="alertAdmin" class="alert-admin">⚠️ ACCESO LIMITADO: No posees permisos de edición para exportar o vaciar historial.</div>

        <form id="mermaForm">
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" required>
            <label for="hora">Hora</label>
            <input type="time" id="hora" required>

            <label for="responsable">Responsable</label>
            <select id="responsable" required onchange="evaluarRol()">
                <option value="" disabled selected>-- Selecciona tu Nombre --</option>
                <option value="Christopher López" data-permiso="CONCEDIDO">Christopher López (Gerente)</option>
                <option value="Yennifer Franco" data-permiso="DENEGADO">Yennifer Franco (Subgerente)</option>
                <option value="Matías Pizarro" data-permiso="CONCEDIDO">Matías Pizarro (Administrador)</option>
            </select>

            <label for="turno">Turno</label>
            <select id="turno" required>
                <option value="AM">AM (Apertura)</option>
                <option value="PM">PM (Tarde)</option>
                <option value="Trasnoche">Trasnoche (Cierre)</option>
            </select>

            <label>Categoría</label>
            <div class="chip-container">
                <div class="chip" onclick="seleccionarCategoria('Carnes', this)">🥩 Carnes</div>
                <div class="chip" onclick="seleccionarCategoria('Snacks', this)">🍟 Snacks</div>
                <div class="chip" onclick="seleccionarCategoria('Postres', this)">🍦 Postres</div>
                <div class="chip" onclick="seleccionarCategoria('Bebidas', this)">🥤 Bebidas</div>
                <div class="chip" onclick="seleccionarCategoria('Pan', this)">🍞 Pan</div>
                <div class="chip" onclick="seleccionarCategoria('Otros', this)">📦 Otros</div>
            </div>

            <label for="producto">Producto</label>
            <select id="producto" required onchange="actualizarUnidad()">
                <option value="" disabled selected>-- Elige una categoría primero --</option>
            </select>

            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" min="0.001" step="0.001" placeholder="Ingresa cantidad" required>
            <span id="unitLabel" class="unit-label"></span>

            <label for="motivo">Motivo</label>
            <select id="motivo" required>
                <option value="" disabled selected>-- Selecciona el Motivo --</option>
                <option value="Quemado/Crudo">Quemado/Crudo</option>
                <option value="Vencido">Vencido</option>
                <option value="Caída al piso">Caída al piso</option>
                <option value="Error de preparación">Error de preparación</option>
                <option value="Mal estado de origen">Mal estado de origen</option>
                <option value="OPERACIÓN - O">OPERACIÓN - O</option>
            </select>

            <label for="comentarios">Justificación / Detalles</label>
            <textarea id="comentarios" rows="2" placeholder="Notas opcionales..."></textarea>

            <div class="btn-group">
                <button type="submit" class="btn-submit">💾 Registrar Fila</button>
            </div>
            
            <div id="adminPanel" style="display:none; margin-top:20px; border-top: 2px solid var(--bk-brown); padding-top:15px;">
                <label>Periodo para Exportar</label>
                <input type="date" id="fechaInicio">
                <input type="date" id="fechaFin">
                <button type="button" class="btn-export" onclick="exportarCSV()">📥 Exportar Periodo CSV</button>
                <button type="button" class="btn-clear-all" onclick="borrarTodo()">🗑️ Vaciar Todo</button>
            </div>
        </form>
    </div>

    <div class="table-container">
        <div class="table-title">📋 Desglose de Mermas Registradas</div>
        <table id="mermasTable">
            <thead><tr><th>Fecha</th><th>Hora</th><th>Resp.</th><th>Prod.</th><th>Cant.</th><th>Motivo</th><th>Acción</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const productosPorCategoria = {
            "Carnes": [{ nombre: "Whopper Patty", unidad: "Unidades" }, { nombre: "Mega Patty", unidad: "Unidades" }],
            "Snacks": [{ nombre: "Nuggets", unidad: "Unidades" }, { nombre: "Chicken Fries", unidad: "Unidades" }],
            "Postres": [{ nombre: "Helado", unidad: "Litros" }, { nombre: "Pie de Manzana", unidad: "Unidades" }],
            "Bebidas": [{ nombre: "Lata Pepsi", unidad: "Unidades" }],
            "Pan": [{ nombre: "Pan Whopper", unidad: "Unidades" }],
            "Otros": [{ nombre: "Lechuga", unidad: "Kg" }]
        };

        let categoriaGlobal = "";
        let mermasData = JSON.parse(localStorage.getItem("bk_mermas_data")) || [];

        window.onload = function() {
            const now = new Date();
            document.getElementById("fecha").value = now.toISOString().split('T')[0];
            document.getElementById("hora").value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            actualizarTabla();
        };

        function seleccionarCategoria(cat, elemento) {
            categoriaGlobal = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            elemento.classList.add('active');
            const comboProducto = document.getElementById("producto");
            comboProducto.innerHTML = '<option value="" disabled selected>-- Elige el Producto --</option>';
            productosPorCategoria[cat].forEach(p => {
                let opt = document.createElement("option");
                opt.value = p.nombre; opt.textContent = p.nombre; opt.setAttribute('data-unit', p.unidad);
                comboProducto.appendChild(opt);
            });
        }

        function actualizarUnidad() {
            const combo = document.getElementById("producto");
            const opcion = combo.options[combo.selectedIndex];
            document.getElementById("unitLabel").textContent = `Medida: ${opcion.getAttribute('data-unit')}`;
        }

        function evaluarRol() {
            const combo = document.getElementById("responsable");
            const opcion = combo.options[combo.selectedIndex];
            const esAdmin = opcion.getAttribute('data-permiso') === "CONCEDIDO";
            document.getElementById("adminPanel").style.display = esAdmin ? "block" : "none";
            document.getElementById("alertAdmin").style.display = esAdmin ? "none" : "block";
        }

        document.getElementById("mermaForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const nuevaMerma = {
                id: Date.now(),
                fecha: document.getElementById("fecha").value,
                hora: document.getElementById("hora").value,
                responsable: document.getElementById("responsable").value,
                producto: document.getElementById("producto").value,
                cantidad: document.getElementById("cantidad").value,
                motivo: document.getElementById("motivo").value
            };
            mermasData.push(nuevaMerma);
            localStorage.setItem("bk_mermas_data", JSON.stringify(mermasData));
            actualizarTabla();
            showToast("✅ Registro guardado");
        });

        function actualizarTabla() {
            const tbody = document.querySelector("#mermasTable tbody");
            tbody.innerHTML = "";
            mermasData.forEach(item => {
                tbody.innerHTML += `<tr><td>${item.fecha}</td><td>${item.hora}</td><td>${item.responsable.split(' ')[0]}</td><td>${item.producto}</td><td>${item.cantidad}</td><td>${item.motivo}</td><td><button class="btn-delete" onclick="eliminarRegistro(${item.id})">X</button></td></tr>`;
            });
        }

        function exportarCSV() {
            const fInicio = document.getElementById("fechaInicio").value;
            const fFin = document.getElementById("fechaFin").value;
            let datosFiltrados = mermasData;
            if (fInicio && fFin) {
                datosFiltrados = mermasData.filter(item => item.fecha >= fInicio && item.fecha <= fFin);
            }
            let csvContent = "\uFEFFFecha;Hora;Responsable;Producto;Cantidad;Motivo\n";
            datosFiltrados.forEach(i => { csvContent += `${i.fecha};${i.hora};${i.responsable};${i.producto};${i.cantidad};${i.motivo}\n`; });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Mermas_BK.csv";
            link.click();
        }

        function eliminarRegistro(id) { mermasData = mermasData.filter(i => i.id !== id); localStorage.setItem("bk_mermas_data", JSON.stringify(mermasData)); actualizarTabla(); }
        function borrarTodo() { if(confirm("¿Vaciar todo?")) { mermasData = []; localStorage.removeItem("bk_mermas_data"); actualizarTabla(); } }
        function showToast(msj) { const t = document.getElementById("toast"); t.textContent = msj; t.style.display = "block"; setTimeout(() => t.style.display = "none", 2000); }
    </script>
</body>
</html>
