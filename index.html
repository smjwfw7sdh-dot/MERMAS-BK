<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Mermas - Burger King</title>
    <style>
        :root {
            --bk-cream: #FDF6E2;
            --bk-brown: #502314;
            --bk-red: #DA291C;
            --bk-orange: #F47321;
            --bk-gold: #FFB81C;
            --bg-card: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Flame', 'Arial Black', sans-serif;
        }

        body {
            background-color: var(--bk-cream);
            color: var(--bk-brown);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            border: 3px solid var(--bk-brown);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 0px var(--bk-brown);
        }

        h2 {
            text-align: center;
            color: var(--bk-red);
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px dashed var(--bk-orange);
            padding-bottom: 10px;
        }

        .alert-admin {
            background-color: #FFF0F0;
            border: 2px solid var(--bk-red);
            color: var(--bk-red);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--bk-brown);
            font-size: 14px;
            text-transform: uppercase;
        }

        select, input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--bk-brown);
            border-radius: 8px;
            background-color: var(--bk-cream);
            color: var(--bk-brown);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--bk-orange);
        }

        .chip-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .chip {
            background-color: var(--bk-cream);
            border: 2px solid var(--bk-brown);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .chip.active {
            background-color: var(--bk-orange);
            color: white;
            border-color: var(--bk-brown);
            transform: translateY(2px);
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
        }

        .unit-label {
            font-size: 12px;
            color: var(--bk-orange);
            margin-top: -10px;
            margin-bottom: 15px;
            display: block;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--bk-brown);
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 var(--bk-brown);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--bk-brown);
        }

        .btn-submit {
            background-color: var(--bk-red);
            color: white;
            margin-bottom: 12px;
        }

        .btn-admin {
            background-color: var(--bk-gold);
            color: var(--bk-brown);
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bk-brown);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🍔 Registro de Mermas BK 🍟</h2>

        <div id="alertAdmin" class="alert-admin">
            ⚠️ PERMISO LIMITADO: Para cierres de día, contacta a Christopher o Matías.
        </div>

        <form id="mermaForm">
            <label for="responsable">Responsable</label>
            <select id="responsable" required onchange="evaluarRol()">
                <option value="" disabled selected>-- Selecciona tu Nombre --</option>
                <option value="Christopher">Christopher (Administrador)</option>
                <option value="Matías">Matías (Administrador)</option>
                <option value="Ignacia González">Ignacia González (Crew)</option>
                <option value="Yennifer Franco">Yennifer Franco (Crew)</option>
                <option value="Kimberly Morán">Kimberly Morán (Crew)</option>
                <option value="Krishna">Krishna (Crew)</option>
                <option value="Bastián">Bastián (Crew)</option>
                <option value="Felipe">Felipe (Crew)</option>
                <option value="Alan">Alan (Crew)</option>
                <option value="Estrella">Estrella (Crew)</option>
            </select>

            <label for="turno">Turno</label>
            <select id="turno" required>
                <option value="AM">AM (Apertura)</option>
                <option value="PM">PM (Tarde)</option>
                <option value="Trasnoche">Trasnoche (Cierre)</option>
            </select>

            <label>Categoría de Alimento</label>
            <div class="chip-container">
                <div class="chip" onclick="seleccionarCategoria('Carnes', this)">🥩 Carnes</div>
                <div class="chip" onclick="seleccionarCategoria('Snacks', this)">🍟 Snacks</div>
                <div class="chip" onclick="seleccionarCategoria('Postres', this)">🍦 Postres</div>
                <div class="chip" onclick="seleccionarCategoria('Panes y Otros', this)">🍞 Panes / Otros</div>
            </div>

            <label for="producto">Producto Específico</label>
            <select id="producto" required onchange="actualizarUnidad()">
                <option value="" disabled selected>-- Elige una categoría primero --</option>
            </select>

            <label for="cantidad">Cantidad a Mermar</label>
            <input type="number" id="cantidad" min="0.01" step="0.01" placeholder="Ej: 5 o 1.5" required>
            <span id="unitLabel" class="unit-label"></span>

            <label for="motivo">Motivo de la Merma</label>
            <select id="motivo" required>
                <option value="" disabled selected>-- Selecciona el Motivo --</option>
                <option value="Vencimiento / Descarte">Vencimiento / Descarte</option>
                <option value="Caída / Contaminación">Caída / Contaminación</option>
                <option value="Mal estado de origen">Mal estado de origen</option>
                <option value="Error de preparación">Error de preparación</option>
                <option value="Quemado / Sobrecoocción">Quemado / Sobrecoocción</option>
            </select>

            <label for="comentarios">Detalles adicionales (Opcional)</label>
            <textarea id="comentarios" rows="2" placeholder="Especifica detalles aquí..."></textarea>

            <button type="submit" class="btn-submit">💾 Guardar Merma</button>
            <button type="button" id="btnFinalizar" class="btn-admin" onclick="finalizarDia()">🏁 Finalizar Día</button>
        </form>
    </div>

    <div id="toast" class="toast">¡Merma guardada con éxito!</div>

    <script>
        // CONFIGURACIÓN DE TU FORMULARIO DE GOOGLE
        const FORM_ID = "1H86V8-p7h_6FkZ-Wqf8Z1ZfD_fV_6Z68H1V8_X6f8Z8";
        
        // Mapeo exacto de los campos que creamos
        const ENTRY_IDS = {
            responsable: "entry.1706680415",
            turno: "entry.245814524",
            producto: "entry.1118679163",
            cantidad: "entry.1158140409",
            motivo: "entry.1147814402",
            comentarios: "entry.1221768822"
        };

        const productosPorCategoria = {
            "Carnes": [
                { nombre: "Whopper Patty", unidad: "Unidades" },
                { nombre: "Mega Patty (4:1)", unidad: "Unidades" },
                { nombre: "Junior Patty (10:1)", unidad: "Unidades" },
                { nombre: "Crispy Chicken", unidad: "Unidades" },
                { nombre: "Tendercrisp Patty", unidad: "Unidades" },
                { nombre: "Rebel Patty (Vegetal)", unidad: "Unidades" },
                { nombre: "Tiras de Tocino", unidad: "Tiras" }
            ],
            "Snacks": [
                { nombre: "Papas Fritas Regular", unidad: "Bolsas / Kg" },
                { nombre: "Nuggets de Pollo", unidad: "Unidades" },
                { nombre: "Aros de Cebolla", unidad: "Unidades" },
                { nombre: "King de Pollo Popcorn", unidad: "Porciones" }
            ],
            "Postres": [
                { nombre: "Base de Helado Vainilla", unidad: "Litros" },
                { nombre: "Salsa de Chocolate", unidad: "Botellas / Gr" },
                { nombre: "Salsa de Manjar", unidad: "Botellas / Gr" },
                { nombre: "Conos de Galleta", unidad: "Unidades" },
                { nombre: "Galletas Oreo Trituradas", unidad: "Paquetes" }
            ],
            "Panes y Otros": [
                { nombre: "Pan Whopper (Sésamo)", unidad: "Unidades" },
                { nombre: "Pan Regular (Junior)", unidad: "Unidades" },
                { nombre: "Pan Brioche", unidad: "Unidades" },
                { nombre: "Queso Cheddar Cheddar", unidad: "Rebanadas" },
                { nombre: "Lechuga Picada", unidad: "Kilogramos" },
                { nombre: "Tomate en Rodajas", unidad: "Unidades" },
                { nombre: "Mayonesa BK", unidad: "Sachets / Bolsas" }
            ]
        };

        let categoriaSeleccionada = "";

        // Inicializar turno automáticamente por la hora
        window.onload = function() {
            const hora = new Date().getHours();
            const comboTurno = document.getElementById("turno");
            if (hora >= 6 && hora < 14) comboTurno.value = "AM";
            else if (hora >= 14 && hora < 22) comboTurno.value = "PM";
            else comboTurno.value = "Trasnoche";
        };

        function seleccionarCategoria(cat, elemento) {
            categoriaSeleccionada = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            elemento.classList.add('active');

            const comboProducto = document.getElementById("producto");
            comboProducto.innerHTML = '<option value="" disabled selected>-- Selecciona un Producto --</option>';

            productosPorCategoria[cat].forEach(p => {
                let opt = document.createElement("option");
                opt.value = p.nombre;
                opt.textContent = p.nombre;
                opt.setAttribute('data-unit', p.unit || p.unidad);
                comboProducto.appendChild(opt);
            });
            document.getElementById("unitLabel").textContent = "";
        }

        function actualizarUnidad() {
            const combo = document.getElementById("producto");
            const opcion = combo.options[combo.selectedIndex];
            const unidad = opcion.getAttribute('data-unit');
            document.getElementById("unitLabel").textContent = `Medida en: ${unidad}`;
        }

        function evaluarRol() {
            const nombre = document.getElementById("responsable").value;
            const alertAdmin = document.getElementById("alertAdmin");
            const btnFinalizar = document.getElementById("btnFinalizar");

            if (nombre === "Christopher" || nombre === "Matías") {
                alertAdmin.style.display = "none";
                btnFinalizar.style.display = "block";
            } else {
                alertAdmin.style.display = "block";
                btnFinalizar.style.display = "none";
            }
        }

        function finalizarDia() {
            if(confirm("¿Estás seguro de que deseas cerrar el registro de mermas del día de hoy?")) {
                showToast("🏁 Día finalizado y reportado.");
            }
        }

        function showToast(msj) {
            const toast = document.getElementById("toast");
            toast.textContent = msj;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 3500);
        }

        // Envío de datos directo por el puente invisible a tu Google Form
        document.getElementById("mermaForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const resp = document.getElementById("responsable").value;
            const turno = document.getElementById("turno").value;
            const prod = document.getElementById("producto").value;
            const cant = document.getElementById("cantidad").value;
            const mot = document.getElementById("motivo").value;
            const com = document.getElementById("comentarios").value;

            // Construir URL de envío para Google Forms
            const urlForm = `https://docs.google.com/forms/d/${FORM_ID}/formResponse`;
            
            const formData = new FormData();
            formData.append(ENTRY_IDS.responsable, resp);
            formData.append(ENTRY_IDS.turno, turno);
            formData.append(ENTRY_IDS.producto, prod);
            formData.append(ENTRY_IDS.cantidad, cant);
            formData.append(ENTRY_IDS.motivo, mot);
            formData.append(ENTRY_IDS.comentarios, com);

            // Envío en segundo plano (Modo silencioso cors no-cors)
            fetch(urlForm, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                showToast("💾 Merma guardada en Sheets");
                document.getElementById("cantidad").value = "";
                document.getElementById("comentarios").value = "";
            }).catch(err => {
                alert("Error al enviar: " + err);
            });
        });
    </script>
</body>
</html>
